# Agrawal et al. (2026)
# "[CII] excess and deficit in star-forming and quiescent galaxies in COSMOS"
# in prep.
#
# Usage: prepare-cosmos-catalog --paper a26
#
# This file overrides only the keys that differ from config/catalog/defaults.toml.

[paper]
id          = "a26"
description = "Agrawal et al. (2026) — [CII] excess/deficit vs. SFR, environment"
reference   = "Agrawal et al. 2026, in prep."

[selection]
redshift_min = 0.01
redshift_max = 6.0
mass_min     = 8.5

# Photometric β for IRX-β consistency; template β correlates with SED fit.
[beta_luv]
method = "photometric"

# Photo-z quality flag: sigma_z/(1+z) <= dz_max marks a source as reliable.
# Critical for emission line work — an uncertain photo-z shifts the line
# in or out of the stacking band and biases the measured excess/deficit.
# Class rules below split each population into reliable/unreliable-z subsets.
[populations]
flag_photoz_quality = true

# Class definitions for [CII] / line excess science.
# photoz_reliable is True when sigma_z/(1+z) <= 0.05 (see defaults.toml).
# Reliable-z sources get even class codes (0, 2, 4, 6);
# uncertain-z sources get odd codes (1, 3, 5, 7) and are stacked separately
# so their contribution can be inspected or suppressed in post-processing.
[[populations.classes]]
code           = 6
label          = "sb_relz"
requires       = ["starburst", "star_forming", "mass_complete", "photoz_reliable"]
requires_not   = []
warn_if_excluded = true

[[populations.classes]]
code           = 7
label          = "sb_uncz"
requires       = ["starburst", "star_forming", "mass_complete"]
requires_not   = ["photoz_reliable"]
warn_if_excluded = true

[[populations.classes]]
code           = 4
label          = "qt_relz"
requires       = ["photoz_reliable"]
requires_not   = ["star_forming"]
warn_if_excluded = false

[[populations.classes]]
code           = 5
label          = "qt_uncz"
requires       = []
requires_not   = ["star_forming", "photoz_reliable"]
warn_if_excluded = false

[[populations.classes]]
code           = 2
label          = "incomplete_sfg_relz"
requires       = ["star_forming", "photoz_reliable"]
requires_not   = ["mass_complete"]
warn_if_excluded = true

[[populations.classes]]
code           = 3
label          = "incomplete_sfg_uncz"
requires       = ["star_forming"]
requires_not   = ["mass_complete", "photoz_reliable"]
warn_if_excluded = true

[[populations.classes]]
code           = 0
label          = "complete_sfg_relz"
requires       = ["star_forming", "mass_complete", "photoz_reliable"]
requires_not   = []
warn_if_excluded = true

[[populations.classes]]
code           = 1
label          = "complete_sfg_uncz"
requires       = ["star_forming", "mass_complete"]
requires_not   = ["photoz_reliable"]
warn_if_excluded = true

# Sersic morphology not required by the primary [CII] analysis but included
# for potential extension: σ_SFR as a predictor of line deficit
# (cf. Sommovigo+2022 radiative equilibrium; Parente+2026 T_dust-σ_SFR).
[morphology]
sersic    = true
sigma_sfr = true
