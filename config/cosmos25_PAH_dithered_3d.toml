        2.125, 2.325, 2.425, 2.525, 2.625, 2.725, 2.875, 3.075, 3.375, 3.675]

[catalog.classification.binning.stellar_mass]
id = "mass_med"
bins = [8.5, 10.5, 12]

[catalog.classification.binning.sigma_sfr]
id = "log_sigma_sfr"
label = "SFR Surface Density"
#bins = [-3.0, -1.71, -0.99, 1.5]
bins = [-2.5, -1.25, 0.5, 2.5]
# -2 to -1: local spirals
# -1 to  0: MS at z~1-2
#  0 to  1: compact SF, local starbursts
#  1 to  2: ULIRGs, SMGs

#[catalog.classification.binning.delta_ms]
#id = "log_delta_ms"
#bins = [-3.0, -1.71, -0.99, 1.5] #WRONG - this is sigma_sfr binning
#bins = [-1.0, -0.3, 0.0, 0.3, 0.7, 1.5]
# -1 to -0.3: below MS (quenching, long t_dep)
#  -0.3 to 0.3: on MS (normal t_dep)
#   0.3 to 0.7: above MS (enhanced SFE)
#   0.7 to 1.5: starburst (very short t_dep, H2-rich)

# Map configurations - each section defines a new map
[maps.mips_24]
